import os, json, csv, re
from datetime import datetime, timezone
from urllib.request import urlopen
from urllib.parse import urlencode

API_KEY    = os.environ["YOUTUBE_API_KEY"]
CHANNEL_ID = "UCDnLRPckRQRHNDPalRpQWlw"
MAX_VIDEOS = int(os.environ.get("MAX_VIDEOS", "100"))
DATA_DIR   = os.path.join(os.path.dirname(__file__), "data")
BASE_URL   = "https://www.googleapis.com/youtube/v3"


def api_get(endpoint, params):
    params["key"] = API_KEY
    url = f"{BASE_URL}/{endpoint}?{urlencode(params)}"
    with urlopen(url) as r:
        return json.loads(r.read().decode())


def get_uploads_playlist():
    data = api_get("channels", {"part": "contentDetails", "id": CHANNEL_ID})
    return data["items"][0]["contentDetails"]["relatedPlaylists"]["uploads"]


def get_video_ids(playlist_id):
    print(f"[1/3] 영상 목록 수집 중 (최대 {MAX_VIDEOS}개)...")
    ids, next_page = [], None
    while len(ids) < MAX_VIDEOS:
        params = {
            "part": "contentDetails",
            "playlistId": playlist_id,
            "maxResults": min(50, MAX_VIDEOS - len(ids)),
        }
        if next_page:
            params["pageToken"] = next_page
        data = api_get("playlistItems", params)
        for item in data.get("items", []):
            ids.append(item["contentDetails"]["videoId"])
        next_page = data.get("nextPageToken")
        if not next_page:
            break
    print(f"    → {len(ids)}개 확인")
    return ids


def parse_duration(iso):
    m = re.match(r"PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?", iso)
    if not m:
        return 0
    h, mi, s = (int(x or 0) for x in m.groups())
    return h * 3600 + mi * 60 + s


def seconds_to_hms(sec):
    if not sec:
        return "0:00"
    h, rem = divmod(int(sec), 3600)
    m, s = divmod(rem, 60)
    return f"{h}:{m:02d}:{s:02d}" if h else f"{m}:{s:02d}"


def get_video_details(video_ids):
    print("[2/3] 영상 상세 정보 수집 중...")
    records = []
    for i in range(0, len(video_ids), 50):
        chunk = video_ids[i:i+50]
        data = api_get("videos", {
            "part": "snippet,statistics,contentDetails",
            "id": ",".join(chunk),
        })
        for rank, item in enumerate(data.get("items", []), start=i+1):
            sn   = item["snippet"]
            st   = item.get("statistics", {})
            cd   = item.get("contentDetails", {})
            dur  = parse_duration(cd.get("duration", "PT0S"))
            thumb = (sn.get("thumbnails", {}).get("maxres") or
                     sn.get("thumbnails", {}).get("high") or {}).get("url", "")
            records.append({
                "rank":          rank,
                "video_id":      item["id"],
                "title":         sn.get("title", ""),
                "view_count":    int(st.get("viewCount", 0)),
                "like_count":    int(st.get("likeCount", 0)),
                "comment_count": int(st.get("commentCount", 0)),
                "duration_str":  seconds_to_hms(dur),
                "duration_sec":  dur,
                "upload_date":   sn.get("publishedAt", "")[:10],
                "thumbnail_url": thumb,
                "video_url":     f"https://www.youtube.com/watch?v={item['id']}",
                "description":   sn.get("description", "")[:300],
            })
    print(f"    → {len(records)}개 수집 완료")
    return records


def save_results(records):
    print("[3/3] 저장 중...")
    os.makedirs(DATA_DIR, exist_ok=True)
    now = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M:%S UTC")
    payload = {"collected_at": now, "total_count": len(records),
               "channel_id": CHANNEL_ID, "videos": records}

    with open(os.path.join(DATA_DIR, "latest.json"), "w", encoding="utf-8") as f:
        json.dump(payload, f, ensure_ascii=False, indent=2)

    if records:
        csv_path = os.path.join(DATA_DIR, "latest.csv")
        with open(csv_path, "w", encoding="utf-8-sig", newline="") as f:
            writer = csv.DictWriter(f, fieldnames=records[0].keys())
            writer.writeheader()
            writer.writerows(records)

    history_dir = os.path.join(DATA_DIR, "history")
    os.makedirs(history_dir, exist_ok=True)
    today = datetime.now(timezone.utc).strftime("%Y-%m-%d")
    with open(os.path.join(history_dir, f"{today}.json"), "w", encoding="utf-8") as f:
        json.dump(payload, f, ensure_ascii=False, indent=2)

    top10 = sorted(records, key=lambda x: x["view_count"], reverse=True)[:10]
    print("\n===== 조회수 TOP 10 =====")
    for r in top10:
        print(f"  {r['rank']:3}. 👁 {r['view_count']:>10,}  [{r['duration_str']:>7}]  {r['title'][:38]}")


def main():
    print("=" * 55)
    print("  하나은행 유튜브 데이터 수집기 (YouTube Data API v3)")
    print(f"  {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')}")
    print("=" * 55)
    playlist_id = get_uploads_playlist()
    video_ids   = get_video_ids(playlist_id)
    records     = get_video_details(video_ids)
    save_results(records)
    print(f"\n완료 — 총 {len(records)}개")


if __name__ == "__main__":
    main()
